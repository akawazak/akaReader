name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Sync version with tag
        shell: bash
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          cd manga-nexus
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$CURRENT_VERSION" ]; then
            echo "Updating package.json from $CURRENT_VERSION to $TAG_VERSION"
            npm version $TAG_VERSION --no-git-tag-version --allow-same-version
            cd ..
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git add manga-nexus/package.json manga-nexus/package-lock.json
            git commit -m "chore: sync version to $TAG_VERSION [skip ci]" || echo "No changes to commit"
            git push || echo "Nothing to push"
          else
            echo "Version already matches: $TAG_VERSION"
          fi

      - name: Install frontend dependencies
        working-directory: manga-nexus
        shell: bash
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install backend dependencies
        working-directory: backend
        shell: bash
        run: npm install --no-audit --no-fund

      - name: Download Suwayomi JAR
        shell: bash
        run: |
          curl -L -o backend/Suwayomi-Server-v2.1.1867.jar \
            https://github.com/Suwayomi/Suwayomi-Server/releases/download/v2.1.1867/Suwayomi-Server-v2.1.1867.jar  

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: manga-nexus
        shell: bash
        run: npm run dist -- --win --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: manga-nexus
        run: npm run dist -- --mac --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: manga-nexus
        run: npm run dist -- --linux --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            manga-nexus/dist-electron/*.exe
            manga-nexus/dist-electron/*.dmg
            manga-nexus/dist-electron/*.zip
            manga-nexus/dist-electron/*.AppImage
            manga-nexus/dist-electron/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-*/*
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}