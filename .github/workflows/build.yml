name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        working-directory: manga-nexus
        shell: bash
        run: npm install --no-audit --no-fund --legacy-peer-deps

      - name: Install backend dependencies
        working-directory: backend
        shell: bash
        run: npm install --no-audit --no-fund

      - name: Download Suwayomi JAR
        shell: bash
        run: |
          curl -L -o backend/Suwayomi-Server-v2.1.1867.jar \
            https://github.com/Suwayomi/Suwayomi-Server/releases/download/v2.1.1867/Suwayomi-Server-v2.1.1867.jar 

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: manga-nexus
        shell: bash
        run: npm run dist -- --win --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: manga-nexus
        run: npm run dist -- --mac --publish=never
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: manga-nexus
        run: npm run dist -- --linux --publish=never
        env:
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            manga-nexus/dist-electron/*.exe
            manga-nexus/dist-electron/*.dmg
            manga-nexus/dist-electron/*.zip
            manga-nexus/dist-electron/*.AppImage
            manga-nexus/dist-electron/*.deb
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-*/*
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}