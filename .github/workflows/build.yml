name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Required for electron-builder to create/upload GitHub releases
permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: manga-nexus/package-lock.json

      # Install Electron/React frontend deps (inside manga-nexus/)
      - name: Install frontend dependencies
        working-directory: manga-nexus
        run: npm install --prefer-offline --no-audit --no-fund
        env:
          CI: true
          npm_config_yes: true

      # Install backend deps (inside backend/ at repo root)
      - name: Install backend dependencies
        working-directory: backend
        run: npm install --prefer-offline

      # Download Suwayomi JAR to backend/ — runs from repo root
      - name: Download Suwayomi JAR
        shell: bash
        run: |
          curl -L -o backend/Suwayomi-Server-v2.1.1867.jar \
            https://github.com/Suwayomi/Suwayomi-Server/releases/download/v2.1.1867/Suwayomi-Server-v2.1.1867.jar

      # Build Vite/React frontend
      - name: Build frontend
        working-directory: manga-nexus
        run: npm run build

      # Package with electron-builder — one job per OS
      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        working-directory: manga-nexus
        run: npm run dist -- --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS)
        if: matrix.os == 'macos-latest'
        working-directory: manga-nexus
        run: npm run dist -- --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Package (Linux)
        if: matrix.os == 'ubuntu-latest'
        working-directory: manga-nexus
        run: npm run dist -- --linux
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Save build outputs as artifacts so the release job can pick them up
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: |
            manga-nexus/dist-electron/*.exe
            manga-nexus/dist-electron/*.dmg
            manga-nexus/dist-electron/*.zip
            manga-nexus/dist-electron/*.AppImage
            manga-nexus/dist-electron/*.deb
          if-no-files-found: ignore

  # Only runs on tag pushes (v*) — creates a draft GitHub Release
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist-*/*
          draft: true
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}